name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run tests
        run: cargo test --workspace

  build-wasm:
    name: Build WASM Release Asset
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: release-wasm

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build WASM
        run: |
          cd mistlib-wasm
          wasm-pack build --target web

      - name: Archive WASM package
        run: |
          cd mistlib-wasm
          zip -r ../mistlib-wasm-pkg-${{ github.ref_name }}.zip pkg LICENSE

      - name: Upload WASM release asset
        uses: actions/upload-artifact@v4
        with:
          name: mistlib-wasm-release
          path: mistlib-wasm-pkg-${{ github.ref_name }}.zip

  build-native:
    name: Build Native Release Asset (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: mistlib-native-linux
            binary_path: target/release/libmistlib.so
            binary_name: libmistlib.so
          - os: windows-latest
            artifact_name: mistlib-native-windows
            binary_path: target/release/mistlib.dll
            binary_name: mistlib.dll
          - os: macos-latest
            artifact_name: mistlib-native-macos
            binary_path: target/release/libmistlib.dylib
            binary_name: libmistlib.dylib
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build native library
        run: cargo build --release -p mistlib-native

      - name: Prepare release files (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "release/${{ matrix.binary_name }}"
          Copy-Item "README.md" "release/README.md"
          Copy-Item "LICENSE" "release/LICENSE"
          Compress-Archive -Path release/* -DestinationPath "${{ matrix.artifact_name }}-${{ github.ref_name }}.zip" -Force

      - name: Prepare release files (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release
          cp "${{ matrix.binary_path }}" "release/${{ matrix.binary_name }}"
          cp README.md release/README.md
          cp LICENSE release/LICENSE
          cd release
          zip -r ../${{ matrix.artifact_name }}-${{ github.ref_name }}.zip .

      - name: Upload native release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-release
          path: ${{ matrix.artifact_name }}-${{ github.ref_name }}.zip

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-wasm
      - build-native
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.zip
